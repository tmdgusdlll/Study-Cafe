spring:
  application:
    name: Study-Cafe
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}   # 기본 프로파일 local
  jpa:
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET}                 # 기본값 제거 — 미설정 시 fail-fast
  expiration-ms: 86400000               # 액세스 토큰: 24시간
  refresh-expiration-ms: 1209600000     # 리프레시 토큰: 14일
