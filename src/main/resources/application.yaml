spring:
  application:
    name: Study-Cafe
  datasource:
    url: jdbc:postgresql://localhost:5432/studycafe
    username: studycafe
    password: studycafe
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET:studycafe-jwt-secret-key-for-development-only-please-change-in-production-env}
  expiration-ms: 86400000          # 액세스 토큰: 24시간
  refresh-expiration-ms: 1209600000 # 리프레시 토큰: 14일

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
